set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -sg escape-time 10
set -g set-clipboard on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind T new-window -c "#{pane_current_path}"
bind -n PageDown split-window -h -c "#{pane_current_path}"
bind -n PageUp split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind r source-file ~/.tmux.conf \; display-message "Reloaded!"

set -g status-position top
set -g status-style "bg=colour235,fg=colour250"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour81,bold]#S #[fg=colour240]| #[fg=colour250]#(whoami)"
set -g status-right "#[fg=colour244]%Y-%m-%d #[fg=colour81]%H:%M"
